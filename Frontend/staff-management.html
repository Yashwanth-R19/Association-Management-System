<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ams-theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
        if (!sessionStorage.getItem('isAuthenticated')) {
            fetch('/api/check-auth').then(function(r){return r.json();}).then(function(d){ if(!d.authenticated) window.location.href='login.html'; }).catch(function(){ window.location.href='login.html'; });
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - Ceebros Gardens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app">
        <div class="app-main">
            <main class="content">
                <div class="screen-header">
                    <h2 class="feature-title">Staff Management</h2>
                    <div>
                        <button class="btn btn-primary" id="checkInBtn">Check In</button>
                        <button class="btn btn-warning" id="checkOutBtn">Check Out</button>
                    </div>
                </div>

                <div class="search-container">
                    <div class="form-group">
                        <input type="text" id="staffSearchInput" class="form-control" placeholder="Search by staff name...">
                    </div>
                    <div class="search-group">
                        <button id="searchStaffBtn" class="btn btn-primary">Search</button>
                        <button id="resetStaffSearchBtn" class="btn btn-outline">Reset</button>
                    </div>
                </div>

                <div class="form-panel" id="checkInFormPanel" style="display:none;">
                    <h3 class="form-title">Staff Check In</h3>
                    <form id="checkInForm">
                        <div class="form-row">
                            <div class="form-col">
                                <div class="form-group">
                                    <label for="staffName">Staff Name</label>
                                    <input type="text" id="staffName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label for="staffWage">Wage Per Hour ($)</label>
                                    <input type="number" id="staffWage" class="form-control" step="0.01" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Check In</button>
                            <button type="button" class="btn btn-outline" id="cancelCheckInBtn">Cancel</button>
                        </div>
                    </form>
                </div>

                <div class="form-panel" id="checkOutFormPanel" style="display:none;">
                    <h3 class="form-title">Staff Check Out</h3>
                    <form id="checkOutForm">
                        <div class="form-row">
                            <div class="form-col">
                                <div class="form-group">
                                    <label for="checkOutStaffName">Staff Name</label>
                                    <input type="text" id="checkOutStaffName" class="form-control" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-warning">Check Out</button>
                            <button type="button" class="btn btn-outline" id="cancelCheckOutBtn">Cancel</button>
                        </div>
                    </form>
                </div>

                <div class="screen-header" style="margin-top: 2rem;">
                    <h3 class="feature-title">Today's Attendance</h3>
                    <button class="btn btn-danger" id="deleteStaffBtn">Delete Staff</button>
                </div>

                <div class="table-container">
                    <table class="data-table" id="attendanceTable">
                        <thead>
                            <tr>
                                <th>Staff Name</th>
                                <th>Check In Time</th>
                                <th>Check Out Time</th>
                                <th>Hours Worked</th>
                                <th>Wage Per Hour</th>
                                <th>Earnings</th>
                                <th class="actions-cell">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Attendance data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script src="js/shell.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/staff-management.js"></script>
</body>
</html>
