<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ams-theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
        if (!sessionStorage.getItem('isAuthenticated')) {
            fetch('/api/check-auth').then(function(r){return r.json();}).then(function(d){ if(!d.authenticated) window.location.href='login.html'; }).catch(function(){ window.location.href='login.html'; });
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints - Ceebros Gardens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app">
        <div class="app-main">
            <main class="content">
                <div class="screen-header">
                    <h2 class="feature-title">Complaints / Helpdesk</h2>
                    <button class="btn btn-primary" id="addComplaintBtn">Log Complaint</button>
                </div>

                <div class="search-container">
                    <div class="form-group">
                        <select id="searchType" class="form-control">
                            <option value="status">Status</option>
                            <option value="priority">Priority</option>
                            <option value="title">Title</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="text" id="searchKeyword" class="form-control" placeholder="Search complaints...">
                    </div>
                    <button class="btn btn-secondary" id="searchBtn">Search</button>
                    <button class="btn btn-outline" id="resetSearchBtn">Reset</button>
                </div>

                <div class="form-panel" id="complaintFormPanel" style="display:none;">
                    <h3 class="form-title">Log New Complaint</h3>
                    <form id="complaintForm">
                        <div class="form-group">
                            <label for="complaintTitle">Title</label>
                            <input type="text" id="complaintTitle" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="complaintDescription">Description</label>
                            <textarea id="complaintDescription" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-col">
                                <div class="form-group">
                                    <label for="complaintPriority">Priority</label>
                                    <select id="complaintPriority" class="form-control">
                                        <option value="normal">Normal</option>
                                        <option value="high">High</option>
                                        <option value="low">Low</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-col">
                                <div class="form-group">
                                    <label for="complaintRaisedBy">Raised By (resident / door number)</label>
                                    <input type="text" id="complaintRaisedBy" class="form-control" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Submit</button>
                            <button type="button" class="btn btn-outline" id="cancelComplaintBtn">Cancel</button>
                        </div>
                    </form>
                </div>

                <div class="table-container">
                    <table class="data-table" id="complaintsTable">
                        <thead>
                            <tr>
                                <th>Priority</th>
                                <th>Title</th>
                                <th>Raised By</th>
                                <th>Status</th>
                                <th>Assigned To</th>
                                <th class="actions-cell">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Complaints loaded here -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script src="js/shell.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/complaints.js"></script>
</body>
</html>
