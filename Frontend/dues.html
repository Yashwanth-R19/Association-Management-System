<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ams-theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
        if (!sessionStorage.getItem('isAuthenticated')) {
            fetch('/api/check-auth').then(function(r){return r.json();}).then(function(d){ if(!d.authenticated) window.location.href='login.html'; }).catch(function(){ window.location.href='login.html'; });
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dues - Ceebros Gardens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app">
        <div class="app-main">
            <main class="content">
                <div class="screen-header">
                    <h2 class="feature-title">Maintenance Dues</h2>
                    <div>
                        <button class="btn btn-outline" id="showUnpaidBtn">Show Unpaid Only</button>
                        <button class="btn btn-primary" id="addDueBtn">Record Due</button>
                    </div>
                </div>

                <div class="form-panel" id="dueFormPanel" style="display:none;">
                    <h3 class="form-title">Record Maintenance Due</h3>
                    <form id="dueForm">
                        <div class="form-row">
                            <div class="form-col">
                                <div class="form-group">
                                    <label for="dueDoorNumber">Door Number</label>
                                    <input type="text" id="dueDoorNumber" class="form-control" required>
                                </div>
                            </div>
                            <div class="form-col">
                                <div class="form-group">
                                    <label for="duePeriod">Period (YYYY-MM)</label>
                                    <input type="month" id="duePeriod" class="form-control" required>
                                </div>
                            </div>
                            <div class="form-col">
                                <div class="form-group">
                                    <label for="dueAmount">Amount</label>
                                    <input type="number" id="dueAmount" class="form-control" step="0.01" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <button type="button" class="btn btn-outline" id="cancelDueBtn">Cancel</button>
                        </div>
                    </form>
                </div>

                <div class="table-container">
                    <table class="data-table" id="duesTable">
                        <thead>
                            <tr>
                                <th>Door Number</th>
                                <th>Resident</th>
                                <th>Period</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th class="actions-cell">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Dues loaded here -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script src="js/shell.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/dues.js"></script>
</body>
</html>
