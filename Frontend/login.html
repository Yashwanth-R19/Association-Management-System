<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function () {
            try {
                var t = localStorage.getItem('ams-theme') || 'light';
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
        })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in - Ceebros Gardens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="auth">
    <button type="button" class="side-btn theme-toggle auth-toggle" id="authThemeToggle" aria-label="Toggle theme" style="width:auto;">
        <span class="t-icons">
            <span class="t-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
            <span class="t-moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg></span>
        </span>
    </button>

    <main class="auth-card">
        <div class="auth-brand">
            <span class="brand-mark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></svg>
            </span>
            <h1>Ceebros Gardens</h1>
            <p>Association management portal</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="name">Username</label>
                <input type="text" id="name" class="form-control" autocomplete="username" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" autocomplete="current-password" required />
            </div>
            <label class="show-password" for="togglePassword">
                <input type="checkbox" id="togglePassword" />
                Show password
            </label>
            <button type="submit" class="btn btn-primary btn-block">Sign in</button>
        </form>
    </main>

    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/login.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('change', function () {
            document.getElementById('password').type = this.checked ? 'text' : 'password';
        });
        document.getElementById('authThemeToggle').addEventListener('click', function () {
            var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            try { localStorage.setItem('ams-theme', next); } catch (e) {}
        });
    </script>
</body>
</html>
