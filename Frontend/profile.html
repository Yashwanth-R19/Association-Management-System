<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ams-theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
        if (!sessionStorage.getItem('isAuthenticated')) {
            fetch('/api/check-auth').then(function(r){return r.json();}).then(function(d){ if(!d.authenticated) window.location.href='login.html'; }).catch(function(){ window.location.href='login.html'; });
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Ceebros Gardens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app">
        <div class="app-main">
            <main class="content">
                <div class="screen-header">
                    <h2 class="feature-title">Your Profile</h2>
                </div>

                <div class="home-cols">
                    <div class="profile-container" style="margin-bottom:0;">
                        <div class="profile-details">
                            <div class="profile-card">
                                <div class="profile-avatar">
                                    <img id="profileImage" src="https://images.pexels.com/photos/8296970/pexels-photo-8296970.jpeg?cs=srgb&dl=pexels-mikhail-nilov-8296970.jpg&fm=jpg" alt="Profile photo">
                                </div>
                                <h2 id="profile-name">Loading...</h2>
                                <p id="profile-role"></p>
                                <p id="profile-created"></p>
                                <p id="profile-last-login"></p>
                                <button class="btn btn-danger" id="logoutBtn" style="margin-top: 15px;">Log Out</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-panel" style="margin-bottom:0;">
                        <h3 class="form-title">Change Password</h3>
                        <form id="passwordForm">
                            <div class="form-group">
                                <label for="currentPassword">Current Password</label>
                                <input type="password" id="currentPassword" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="newPassword">New Password</label>
                                <input type="password" id="newPassword" class="form-control" minlength="8" required>
                                <small class="form-text">At least 8 characters</small>
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">Confirm New Password</label>
                                <input type="password" id="confirmPassword" class="form-control" minlength="8" required>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Update Password</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/shell.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
