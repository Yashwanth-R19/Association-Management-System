<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceebros Gardens</title>
    <script>
        // Route to Home if already signed in, otherwise to Login.
        fetch('/api/check-auth')
            .then(function (r) { return r.json(); })
            .then(function (d) { window.location.replace(d && d.authenticated ? 'home.html' : 'login.html'); })
            .catch(function () { window.location.replace('login.html'); });
    </script>
</head>
<body></body>
</html>
