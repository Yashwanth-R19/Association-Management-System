<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Check both sessionStorage and server-side session
        if (!sessionStorage.getItem('isAuthenticated')) {
            // Verify with server
            fetch('/api/check-auth')
                .then(response => response.json())
                .then(data => {
                    if (!data.authenticated) {
                        window.location.href = 'login.html';
                    }
                })
                .catch(() => {
                    window.location.href = 'login.html';
                });
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facility Tracking - Ceebros Gardens</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="branding">
                <h1>Ceebros<span>Gardens</span></h1>
                <p class="tagline">Association Management System</p>
            </div>
            <nav>
                <ul>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="residents.html">Residents</a></li>
                    <li><a href="association.html">Association</a></li>
                    <li><a href="meetings.html">Meetings</a></li>
                    <li><a href="facility-tracking.html" class="active">Facilities</a></li>
                    <li><a href="vendor-management.html">Vendors</a></li>
                    <li><a href="staff-management.html">Staff</a></li>
                    <li class="user-menu">
                        <a href="profile.html" class="user-link">
                            <span class="user-name">Admin</span>
                            <i class="user-icon"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="screen-header">
            <h2 class="feature-title">Facility Usage Tracking</h2>
            <button id="addFacilityUsageBtn" class="btn btn-primary">
                <i class="icon-plus"></i> Add Facility Usage
            </button>
        </div>

        <div class="search-container">
            <div class="form-group">
                <select id="facilitySearchType" class="form-control">
                    <option value="resident">By Resident Name</option>
                    <option value="door">By Door Number</option>
                    <option value="facility">By Facility</option>
                    <option value="date">By Date</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" id="facilitySearchInput" class="form-control" placeholder="Enter search term...">
            </div>
            <button id="facilitySearchBtn" class="btn btn-primary">Search</button>
            <button id="facilityResetBtn" class="btn btn-outline">Reset</button>
        </div>

        <div class="form-panel" id="facilityUsageFormPanel" style="display:none;">
            <h3 id="facilityFormTitle" class="form-title">Add Facility Usage</h3>
            <form id="facilityUsageForm">
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="facilityResidentName">Resident Name</label>
                            <input type="text" id="facilityResidentName" class="form-control" required>
                            <small class="form-text">Only letters and spaces (max 49 characters)</small>
                        </div>
                        <div class="form-group">
                            <label for="facilityResidentDoor">Door Number</label>
                            <input type="text" id="facilityResidentDoor" class="form-control" required
                                   pattern="[A-Za-z]+-\d+-[A-Za-z]">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="facilityType">Facility Type</label>
                            <select id="facilityType" class="form-control" required>
                                <option value="">Select Facility</option>
                                <option value="gym">Gym</option>
                                <option value="pool">Swimming Pool</option>
                                <option value="clubhouse">Clubhouse</option>
                                <option value="playground">Playground</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="facilityDate">Date</label>
                            <input type="date" id="facilityDate" class="form-control" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="facilityStartTime">Start Time</label>
                            <input type="time" id="facilityStartTime" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="facilityEndTime">End Time</label>
                            <input type="time" id="facilityEndTime" class="form-control">
                        </div>
                    </div>
                </div>
                
                <div class="form-group" style="text-align: right;">
                    <button type="submit" class="btn btn-primary">Save Usage</button>
                    <button type="button" class="btn btn-outline" id="cancelFacilityBtn">Cancel</button>
                </div>
            </form>
        </div>

        <div class="table-container">
            <table class="data-table" id="facilityUsageTable">
                <thead>
                    <tr>
                        <th>Resident Name</th>
                        <th>Door Number</th>
                        <th>Facility</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Duration (mins)</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/facility-tracking.js"></script>
</body>
</html>
